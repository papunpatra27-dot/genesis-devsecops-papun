##############################################################################
# slo/genesis-platform-api-slo.yaml
# Service Level Objective for the Genesis Platform API.
#
# The PromQL query in sli.query is the SAME expression used in:
#   - k8s/analysis-template.yaml (canary gate)
#   - k8s/prometheus-rules.yaml  (fast/slow burn alert rules)
# This ensures the canary gate and the SLO share one measurement definition.
##############################################################################

service: genesis-platform-api
environment: staging

sli:
  type: availability
  measurement: (successful_requests / total_requests) * 100
  datasource: Prometheus — http_requests_total (by status_code label)

  # The canonical PromQL expression — SAME expression used in analysis-template.yaml.
  # Returns the HTTP 5xx ERROR RATE (0 = no errors, 1 = total failure).
  # Availability = 1 - error_rate; so error_rate ≤ 0.001 equals 99.9% availability.
  # The 'or vector(0)' guard handles zero-traffic windows (returns 0 = no errors).
  query: |
    (
      sum(rate(http_requests_total{namespace="staging", status_code=~"5.."}[2m]))
      /
      sum(rate(http_requests_total{namespace="staging"}[2m]))
    ) or vector(0)

slo:
  target_percent: 99.9
  # Justification: see docs/slo-rationale.md
  # 99.9% = 43.8 minutes downtime per month. Chosen because:
  #   1. Load tests showed p99 < 200 ms with <0.1% errors under nominal load.
  #   2. Service is internal operations tooling (not direct customer-facing SaaS)
  #      but tenant data pipelines depend on it — warrants three nines.
  #   3. Free-tier EC2 t3.micro has burstable CPU; 99.99% is unrealistic.
  window: 30d

error_budget:
  # 30 days × 24 h × 60 min × (1 - 0.999) = 43.8 minutes
  allowed_failure_minutes: 43.8

  burn_rate_fast_window: 1h
  burn_rate_slow_window: 6h

  # Fast burn threshold: consuming budget at ≥14× the normal rate over 1 hour
  # means the full 30-day budget will be gone in ~2 hours → page immediately.
  alert_threshold_fast: 14

  # Slow burn threshold: consuming at ≥6× over 6 hours → investigate before
  # the next deployment window; not yet a P1 but trending badly.
  alert_threshold_slow: 6

  # Measured after running the load test in reports/load-test-run.txt
  current_burn_rate: 0.03  # ~3% of monthly budget consumed in 30-min load run

policy:
  at_50_percent_budget_consumed: >-
    Engineering lead is notified via Slack #platform-alerts.
    Upcoming deployments reviewed for risk; non-critical changes deferred.

  at_75_percent_budget_consumed: >-
    Deployment freeze on non-critical changes.
    Incident review begins. SRE on-call paged.
    All canary rollouts require manual promotion (automated promotion suspended).

  at_100_percent_consumed: >-
    Full incident declared. Deployment freeze (all changes require VP approval).
    Post-mortem scheduled within 48 hours.
    RCA shared with stakeholders.

  review_cadence: >-
    Weekly SLO review (platform team lead + one rotating engineer).
    Quarterly full review with business stakeholders.
    Attendees: platform lead, product manager, on-call engineer.

rollout_gate:
  # The canary is evaluated using the SAME PromQL expression as the SLI above,
  # but scoped to the canary service only:
  canary_success_condition: |
    sum(rate(http_requests_total{namespace="staging", service="genesis-platform-api-canary", status_code=~"5.."}[2m]))
    /
    sum(rate(http_requests_total{namespace="staging", service="genesis-platform-api-canary"}[2m]))
    <= 0.02

  # The canary gate is deliberately stricter than the SLO (2% error ≪ 0.1% SLO allowance).
  # See docs/slo-rationale.md for the reasoning.
  auto_promote_threshold: 98.0   # error rate ≤ 2% → promote
  auto_abort_threshold: 2.0      # error rate > 2% → abort and rollback

owner: platform-team
last_reviewed: "2026-06-05"
