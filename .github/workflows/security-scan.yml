##############################################################################
# .github/workflows/security-scan.yml
# Reusable workflow — Stages 1-4 (secret scanning, dependency audit, SAST,
# unit tests). Called by ci.yml on every PR.
# Platform teams share this workflow across repositories.
##############################################################################
name: Security Scan (Reusable)

on:
  workflow_call:
    inputs:
      python-version:
        required: false
        type: string
        default: "3.12"
    outputs:
      coverage-pct:
        description: "Test coverage percentage"
        value: ${{ jobs.unit-tests.outputs.coverage-pct }}

jobs:
  ##############################################################################
  # Stage 1 — Secret Scanning (Gitleaks)
  # Gate: YES — any detected secret blocks all downstream stages.
  # Evidence: blocked run screenshot when Flaw 1 (planted secret) is present.
  ##############################################################################
  secret-scan:
    name: "Stage 1 — Secret Scanning (Gitleaks)"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history so Gitleaks scans all commits

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}  # Needed for org-mode

  ##############################################################################
  # Stage 2 — Dependency Audit (pip-audit)
  # Gate: YES — HIGH/CRITICAL CVEs block the pipeline.
  # Evidence: audit report exported as pipeline artifact.
  ##############################################################################
  dependency-audit:
    name: "Stage 2 — Dependency Audit (pip-audit)"
    runs-on: ubuntu-latest
    needs: [secret-scan]   # Must not run if Stage 1 fails
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install pip-audit
        run: pip install pip-audit

      - name: Run pip-audit
        run: |
          pip-audit \
            -r app/requirements.txt \
            --format=json \
            --output=reports/pip-audit.json \
            --desc
        continue-on-error: false

      - name: Upload pip-audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pip-audit-report
          path: reports/pip-audit.json

  ##############################################################################
  # Stage 3 — SAST (Semgrep)
  # Gate: YES — findings at ERROR level block the pipeline.
  # Evidence: SARIF report uploaded to GitHub Security tab.
  # Flaw 2 (intentional SAST finding) must appear in the report.
  ##############################################################################
  sast:
    name: "Stage 3 — SAST (Semgrep)"
    runs-on: ubuntu-latest
    needs: [secret-scan]   # Parallel with Stage 2, but requires Stage 1
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/owasp-top-ten
            p/secrets
          generateSarif: "1"
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif

      - name: Upload SARIF artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: semgrep-sarif
          path: semgrep.sarif

  ##############################################################################
  # Stage 4 — Unit Tests + Coverage (pytest + pytest-cov)
  # Gate: YES — coverage must be >= 75%.
  # Evidence: coverage badge in README, XML report as artifact.
  ##############################################################################
  unit-tests:
    name: "Stage 4 — Unit Tests + Coverage (pytest)"
    runs-on: ubuntu-latest
    needs: [secret-scan]   # Parallel with Stages 2-3, requires Stage 1
    outputs:
      coverage-pct: ${{ steps.coverage.outputs.pct }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ inputs.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt

      - name: Run pytest with coverage
        id: coverage
        working-directory: app
        run: |
          pytest \
            --cov=. \
            --cov-report=term-missing \
            --cov-report=xml:../reports/coverage.xml \
            --cov-fail-under=75 \
            -v
          # Extract coverage percentage for the output variable
          COV=$(python -c "
          import xml.etree.ElementTree as ET
          tree = ET.parse('../reports/coverage.xml')
          rate = float(tree.getroot().attrib['line-rate']) * 100
          print(f'{rate:.1f}')
          ")
          echo "pct=${COV}" >> "$GITHUB_OUTPUT"

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: reports/coverage.xml
