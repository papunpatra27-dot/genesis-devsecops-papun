# Compliant Deployment — passes all 4 OPA guardrails
apiVersion: apps/v1
kind: Deployment
metadata:
  name: compliant-example
  namespace: staging
spec:
  replicas: 2
  selector:
    matchLabels:
      app: compliant-example
  template:
    metadata:
      labels:
        app: compliant-example
    spec:
      containers:
        - name: api
          image: 320644184091.dkr.ecr.ap-south-2.amazonaws.com/genesis-platform-api:sha-abc1234
          ports:
            - containerPort: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10

